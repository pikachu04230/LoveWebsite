<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>想和妳變得更親密 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light:  #ffd6e7;
      --pink-mid:    #ff9ec5;
      --pink-deep:   #e0559a;
      --pink-darker: #b5337a;
      --purple-soft: #c9a8f5;
      --purple-mid:  #9b5de5;
      --cream:       #fff5f9;
      --text-dark:   #3a1a2e;
    }

    body {
      font-family: 'Press Start 2P', monospace;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 8px; height: 8px;
      background: var(--pink-mid);
      animation: twinkle 2s infinite alternate;
    }
    .star::before, .star::after {
      content: '';
      position: absolute;
      background: inherit;
    }
    .star::before { width: 8px; height: 24px; top: -8px; left: 0; }
    .star::after  { width: 24px; height: 8px; top: 0; left: -8px; }

    @keyframes twinkle {
      0%   { opacity: 0.2; transform: scale(0.7); }
      100% { opacity: 1;   transform: scale(1.1); }
    }

    .heart-bg {
      position: fixed;
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
      padding: 32px 16px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease;
    }
    .page.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card {
      background: #fff;
      border: 4px solid var(--pink-deep);
      box-shadow: 8px 8px 0px var(--pink-mid);
      padding: 36px 32px;
      max-width: 520px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* PAGE 1 */
    .pixel-img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      image-rendering: pixelated;
      animation: bounce 1.6s ease-in-out infinite;
      border: 3px solid var(--pink-mid);
      background: var(--pink-light);
      padding: 8px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .title {
      font-size: clamp(10px, 2.5vw, 14px);
      color: var(--pink-darker);
      text-align: center;
      line-height: 2.2;
      text-shadow: 2px 2px 0 var(--pink-light);
    }

    .btn-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      min-height: 80px;
      position: relative;
    }

    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      cursor: pointer;
      padding: 12px 28px;
      border: 3px solid;
      user-select: none;
      white-space: nowrap;
    }

    .btn-yes {
      background: var(--pink-deep);
      color: #fff;
      border-color: var(--pink-darker);
      box-shadow: 4px 4px 0 var(--pink-darker);
      transition: background 0.12s, transform 0.08s;
    }
    .btn-yes:hover {
      background: var(--purple-mid);
      border-color: #6a2db5;
      box-shadow: 4px 4px 0 #6a2db5;
    }
    .btn-yes:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--pink-darker); }

    .btn-no {
      background: #b0b0b0;
      color: #fff;
      border-color: #888;
      box-shadow: 4px 4px 0 #888;
      position: fixed;
      transition: none;
    }

    .pixel-divider {
      width: 100%;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        var(--pink-mid) 0px,
        var(--pink-mid) 8px,
        transparent 8px,
        transparent 16px
      );
    }

    /* PAGE 2 */
    .big-emoji {
      font-size: 64px;
      animation: heartbeat 1.2s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25%       { transform: scale(1.15); }
      50%       { transform: scale(1); }
      75%       { transform: scale(1.1); }
    }

    .options-label {
      font-size: 8px;
      color: var(--pink-darker);
      text-align: center;
      line-height: 2;
      opacity: 0.85;
    }

    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    .btn-option {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      padding: 14px 10px;
      border: 3px solid var(--purple-mid);
      background: var(--pink-light);
      color: var(--purple-mid);
      box-shadow: 3px 3px 0 var(--purple-soft);
      text-align: center;
      line-height: 1.8;
      transition: background 0.12s, transform 0.08s, box-shadow 0.08s;
      user-select: none;
    }
    .btn-option:hover {
      background: var(--purple-mid);
      color: #fff;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--pink-deep);
    }
    .btn-option:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--pink-deep);
    }

    /* PAGE 3 */
    .response-text {
      font-size: clamp(8px, 2vw, 11px);
      color: var(--pink-darker);
      text-align: center;
      line-height: 2.4;
    }

    .btn-back {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      cursor: pointer;
      padding: 10px 22px;
      border: 3px solid var(--pink-deep);
      background: var(--cream);
      color: var(--pink-deep);
      box-shadow: 3px 3px 0 var(--pink-mid);
      transition: background 0.12s;
    }
    .btn-back:hover { background: var(--pink-light); }

    /* CONFETTI */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 16px; }
      .option-grid { grid-template-columns: 1fr; }
      .pixel-img { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>

  <div class="bg-stars" id="bgStars"></div>

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <div class="card">
      <img class="pixel-img" src="pixel_couple.png" alt="可愛像素小人" />
      <div class="pixel-divider"></div>
      <p class="title">✨ 想和妳<br/>變得更親密 ✨</p>
      <div class="pixel-divider"></div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btnYes" onclick="handleYes()">💗 要</button>
        <button class="btn btn-no"  id="btnNo">不要</button>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="card">
      <div class="big-emoji">🤝</div>
      <p class="title" style="color: var(--purple-mid);">那我們從<br/>牽手開始吧！</p>
      <div class="pixel-divider"></div>
      <p class="options-label">── 接下來妳想要… ──</p>
      <div class="option-grid">
        <button class="btn-option" onclick="handleOption('一起散步牽手 🌸')">一起散步<br/>牽手 🌸</button>
        <button class="btn-option" onclick="handleOption('一起看電影 🎬')">一起看<br/>電影 🎬</button>
        <button class="btn-option" onclick="handleOption('一起吃飯約會 🍜')">一起吃飯<br/>約會 🍜</button>
        <button class="btn-option" onclick="handleOption('傳訊息聊到天亮 💬')">傳訊息<br/>聊到天亮 💬</button>
        <button class="btn-option" onclick="handleOption('一起拍可愛的合照 📸')">一起拍<br/>合照 📸</button>
        <button class="btn-option" onclick="handleOption('以上全部都要 💖')">以上<br/>全部都要 💖</button>
      </div>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <div class="card">
      <div class="big-emoji" id="p3Emoji">💕</div>
      <p class="title" style="color: var(--purple-mid);">太好了！！</p>
      <div class="pixel-divider"></div>
      <p class="response-text">
        妳選擇了…<br/><br/>
        <span id="chosenOption" style="color:var(--pink-deep)"></span>
        <br/><br/>
        那就說好囉，<br/>期待和妳在一起的<br/>每一刻 ✨
      </p>
      <div class="pixel-divider"></div>
      <button class="btn-back" onclick="goBack()">← 重新選擇</button>
    </div>
  </div>

  <script>
    // ── Background decoration ──
    (function() {
      const bg = document.getElementById('bgStars');
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = `left:${Math.random()*95}%;top:${Math.random()*95}%;animation-delay:${(Math.random()*2).toFixed(2)}s;animation-duration:${(1.5+Math.random()*2).toFixed(2)}s;opacity:${(0.2+Math.random()*0.5).toFixed(2)};transform:scale(${(0.4+Math.random()*0.6).toFixed(2)});`;
        bg.appendChild(s);
      }
      const hearts = ['💗','💕','💖','✨','🌸','💓'];
      for (let i = 0; i < 10; i++) {
        const h = document.createElement('div');
        h.className = 'heart-bg';
        h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
        h.style.cssText = `left:${Math.random()*95}%;animation-duration:${(6+Math.random()*8).toFixed(1)}s;animation-delay:${(Math.random()*8).toFixed(1)}s;font-size:${14+Math.floor(Math.random()*18)}px;`;
        bg.appendChild(h);
      }
    })();

    // ── Escaping NO button ──
    const btnNo = document.getElementById('btnNo');
    let noX = 0, noY = 0, initialized = false;

    function initNoPos() {
      if (initialized) return;
      const r = btnNo.getBoundingClientRect();
      noX = r.left; noY = r.top;
      btnNo.style.position = 'fixed';
      btnNo.style.left = noX + 'px';
      btnNo.style.top  = noY + 'px';
      btnNo.style.zIndex = '100';
      initialized = true;
    }

    function escape(cx, cy) {
      initNoPos();
      const r = btnNo.getBoundingClientRect();
      const bx = r.left + r.width  / 2;
      const by = r.top  + r.height / 2;
      const dx = bx - cx, dy = by - cy;
      const d  = Math.sqrt(dx*dx + dy*dy) || 1;
      const spd = 180;
      let nx = noX + (dx/d)*spd;
      let ny = noY + (dy/d)*spd;
      nx = Math.max(8, Math.min(nx, window.innerWidth  - r.width  - 8));
      ny = Math.max(8, Math.min(ny, window.innerHeight - r.height - 8));
      noX = nx; noY = ny;
      btnNo.style.left = noX + 'px';
      btnNo.style.top  = noY + 'px';
    }

    btnNo.addEventListener('mouseover', e => escape(e.clientX, e.clientY));
    btnNo.addEventListener('mousemove', e => escape(e.clientX, e.clientY));
    btnNo.addEventListener('touchstart', e => { escape(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive:false });
    btnNo.addEventListener('touchmove',  e => { escape(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive:false });

    // ── Confetti ──
    function burst() {
      const colors = ['#ff9ec5','#e0559a','#c9a8f5','#9b5de5','#ffd6e7','#fff'];
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const sz = 6 + Math.random()*10;
        c.style.cssText = `left:${20+Math.random()*60}%;top:${10+Math.random()*30}%;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'0'};animation-duration:${(0.8+Math.random()*1.5).toFixed(2)}s;animation-delay:${(Math.random()*.4).toFixed(2)}s;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 2500);
      }
    }

    // ── Navigation ──
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function handleYes() {
      burst();
      setTimeout(() => showPage('page2'), 500);
    }

    function handleOption(opt) {
      document.getElementById('chosenOption').textContent = opt;
      const map = {
        '一起散步牽手 🌸':'🌸',
        '一起看電影 🎬':'🎬',
        '一起吃飯約會 🍜':'🍜',
        '傳訊息聊到天亮 💬':'💬',
        '一起拍可愛的合照 📸':'📸',
        '以上全部都要 💖':'🥰'
      };
      document.getElementById('p3Emoji').textContent = map[opt] || '💕';
      burst();
      setTimeout(() => showPage('page3'), 400);
    }

    function goBack() { showPage('page2'); }
  </script>
</body>
</html>
