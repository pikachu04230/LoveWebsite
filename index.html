<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>想和妳變得更親密 💕</title>
  <meta name="description" content="一封來自心底的浪漫邀請，想和最特別的妳變得更親密" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    /* ── Reset & Custom Properties ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --rose-100: #ffe0e6;
      --rose-200: #ffc2d1;
      --rose-300: #ff8fa3;
      --rose-400: #ff6b8a;
      --rose-500: #ff3366;
      --lavender-200: #e0aaff;
      --lavender-300: #c77dff;
      --lavender-400: #9d4edd;
      --text-primary: #2d1b30;
      --text-secondary: #6b4c6e;
      --glass-bg: rgba(255, 255, 255, 0.22);
      --glass-border: rgba(255, 255, 255, 0.35);
      --card-shadow:
        0 8px 32px rgba(45, 27, 48, 0.1),
        0 2px 8px rgba(45, 27, 48, 0.06);
      --card-radius: 28px;
      --btn-radius: 50px;
      --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ── Body & Animated Background ── */
    body {
      font-family: 'Outfit', 'Noto Sans TC', -apple-system, sans-serif;
      background: linear-gradient(-45deg, #ffdde1, #f5c6d0, #e8b4c8, #dbb4d4, #c9b4e8);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      25%  { background-position: 50% 0%; }
      50%  { background-position: 100% 50%; }
      75%  { background-position: 50% 100%; }
    }

    /* ── Background Effects ── */
    .bg-effects {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.5;
      animation: floatOrb ease-in-out infinite alternate;
    }

    @keyframes floatOrb {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -25px) scale(1.05); }
      66%  { transform: translate(-20px, 15px) scale(0.95); }
      100% { transform: translate(10px, -10px) scale(1.02); }
    }

    .heart-particle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: floatHeart linear infinite;
    }

    @keyframes floatHeart {
      0%   { transform: translateY(105vh) rotate(0deg) scale(0.6); opacity: 0; }
      8%   { opacity: 0.5; }
      50%  { transform: translateY(50vh) rotate(10deg) scale(1); opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(-5deg) scale(0.8); opacity: 0; }
    }

    /* ── Page Layout & Transitions ── */
    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transform: translateY(28px) scale(0.97);
      transition: opacity 0.4s ease, transform 0.4s var(--ease-smooth);
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .page.leaving {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px) scale(0.97);
    }

    /* ── Card Glassmorphism ── */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.45);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
      position: relative;
    }

    /* Subtle top shine overlay */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 100%);
      border-radius: var(--card-radius) var(--card-radius) 0 0;
      pointer-events: none;
    }

    /* ── Avatar with Gradient Ring ── */
    .avatar-ring {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--rose-400), var(--lavender-300), var(--rose-300));
      background-size: 200% 200%;
      animation: ringGlow 4s ease infinite, gentleFloat 4s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(255, 107, 138, 0.25), 0 0 80px rgba(199, 125, 255, 0.1);
      flex-shrink: 0;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.85);
      display: block;
    }

    @keyframes ringGlow {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ── Typography ── */
    .title {
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 700;
      line-height: 1.4;
      background: linear-gradient(135deg, var(--rose-500), var(--lavender-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(14px, 3.5vw, 16px);
      color: var(--text-secondary);
      line-height: 1.8;
      font-weight: 500;
      margin-top: 6px;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 2px;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-200), transparent);
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
    }

    .btn {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      padding: 14px 36px;
      border: none;
      border-radius: var(--btn-radius);
      user-select: none;
      white-space: nowrap;
      transition: all 0.3s var(--ease-smooth);
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .btn-yes {
      background: linear-gradient(135deg, var(--rose-400) 0%, var(--lavender-300) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 107, 138, 0.35);
      letter-spacing: 0.5px;
    }

    /* Shimmer sweep on hover */
    .btn-yes::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
      transition: left 0.6s ease;
    }

    .btn-yes:active { transform: translateY(1px) scale(0.97); }

    .btn-no {
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      /* Let width follow content — doEscape() reads offsetWidth after each
         text update, so escape bounds always match the current button size. */
      min-width: 100px;
      transition: left 0.25s var(--ease-smooth),
                  top 0.25s var(--ease-smooth),
                  width 0.2s var(--ease-smooth),
                  background 0.3s ease,
                  color 0.3s ease;
    }

    /* Extended hover zone for escape trigger */
    #btnNo:not(.surrendered)::before {
      content: '';
      position: absolute;
      top: -35px; right: -35px; bottom: -35px; left: -35px;
      z-index: -1;
    }

    /* ── Option Grid ── */
    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
    }

    .option-card {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 22px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .option-emoji {
      font-size: 32px;
      line-height: 1;
      transition: transform 0.3s ease;
    }

    .option-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .option-card:active {
      transform: translateY(1px) scale(0.97);
    }

    /* ── Big Emoji (Page 2 & 3) ── */
    .big-emoji {
      font-size: 64px;
      line-height: 1;
      animation: heartPulse 1.5s ease-in-out infinite;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); }
      15%  { transform: scale(1.15); }
      30%  { transform: scale(1); }
      45%  { transform: scale(1.08); }
      60%  { transform: scale(1); }
    }

    /* ── Response Page (Page 3) ── */
    .response-text {
      font-size: clamp(15px, 4vw, 17px);
      color: var(--text-primary);
      line-height: 1.9;
      font-weight: 500;
    }

    .chosen-highlight {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose-400), var(--lavender-300));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      padding: 12px 0;
    }

    /* Romantic poem — italic, lighter weight */
    .promise-poem {
      font-size: clamp(14px, 3.5vw, 16px);
      font-style: italic;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 2;
      opacity: 0.9;
    }

    .btn-back {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 12px 28px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.25);
      color: var(--text-secondary);
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotateX(0) rotateZ(0); opacity: 1; }
      100% { transform: translateY(100vh) rotateX(720deg) rotateZ(360deg); opacity: 0; }
    }

    /* ── Focus Indicators ── */
    .btn:focus-visible,
    .option-card:focus-visible,
    .btn-back:focus-visible {
      outline: 3px solid var(--lavender-300);
      outline-offset: 3px;
    }

    /* ── Hover Effects (pointer devices only) ── */
    @media (hover: hover) {
      .btn-yes:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 8px 30px rgba(255, 107, 138, 0.45);
      }
      .btn-yes:hover::after {
        left: 100%;
      }
      .option-card:hover {
        transform: translateY(-6px);
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 12px 32px rgba(155, 93, 229, 0.15);
        border-color: rgba(199, 125, 255, 0.4);
      }
      .option-card:hover .option-emoji {
        transform: scale(1.25);
      }
      .btn-back:hover {
        background: rgba(255, 255, 255, 0.5);
        transform: translateX(-4px);
        border-color: rgba(255, 255, 255, 0.9);
      }
    }

    /* ── Staggered Entrance Animation ── */
    .card > * { opacity: 0; }

    .page.active .card > * {
      animation: childSlideIn 0.5s ease forwards;
    }
    .page.active .card > *:nth-child(1) { animation-delay: 0.05s; }
    .page.active .card > *:nth-child(2) { animation-delay: 0.12s; }
    .page.active .card > *:nth-child(3) { animation-delay: 0.19s; }
    .page.active .card > *:nth-child(4) { animation-delay: 0.26s; }
    .page.active .card > *:nth-child(5) { animation-delay: 0.32s; }
    .page.active .card > *:nth-child(6) { animation-delay: 0.38s; }

    @keyframes childSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Accessibility: Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.2s !important;
      }
      body { animation: none; }
      .card > * { opacity: 1; }
    }

    /* ── Responsive: Tablet ── */
    @media (max-width: 768px) {
      .card {
        padding: 40px 28px;
        gap: 20px;
      }
      .option-grid { gap: 12px; }
    }

    /* ── Responsive: Mobile ── */
    @media (max-width: 480px) {
      .page { padding: 16px 12px; }

      .card {
        padding: 32px 16px;
        border-radius: 22px;
        gap: 16px;
      }
      .avatar-ring {
        width: 130px;
        height: 130px;
      }
      .btn {
        padding: 12px 20px;
        font-size: 15px;
        white-space: normal;
        line-height: 1.4;
        text-align: center;
        height: auto;
      }
      .btn-yes {
        padding: 13px 24px;
      }
      .btn-no:not([style*="position: absolute"]) {
        min-width: 100px;
      }
      .btn-row {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .option-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .option-card {
        flex-direction: row;
        padding: 16px 20px;
        gap: 14px;
      }
      .option-text {
        text-align: left;
      }
      .option-emoji { font-size: 28px; }
      .big-emoji { font-size: 52px; }

      .slider-label { font-size: 13px; }

      #btnNo:not(.surrendered)::before {
        top: -20px; right: -20px; bottom: -20px; left: -20px;
      }
    }

    /* ── Page 4: Datetime Picker ── */
    .datetime-picker {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      font-size: 16px;
      padding: 14px 20px;
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: var(--text-primary);
      outline: none;
      width: 100%;
      box-shadow: inset 0 2px 8px rgba(45, 27, 48, 0.04), 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: all 0.3s var(--ease-smooth);
      margin-bottom: 8px;
    }

    .datetime-picker:focus {
      background: rgba(255, 255, 255, 0.6);
      border-color: var(--lavender-300);
      box-shadow: 0 0 0 3px rgba(199, 125, 255, 0.2);
    }

    /* ── Flatpickr Glassmorphism Overrides ── */
    .flatpickr-calendar {
      background: rgba(255, 255, 255, 0.4) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
      border-radius: 20px !important;
      box-shadow: 0 8px 32px rgba(45, 27, 48, 0.1) !important;
      font-family: 'Outfit', 'Noto Sans TC', sans-serif !important;
    }
    .flatpickr-calendar.arrowTop::before, .flatpickr-calendar.arrowTop::after,
    .flatpickr-calendar.arrowBottom::before, .flatpickr-calendar.arrowBottom::after {
      display: none !important;
    }
    .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange, .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange, .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus, .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover, .flatpickr-day.selected.prevMonthDay, .flatpickr-day.startRange.prevMonthDay, .flatpickr-day.endRange.prevMonthDay, .flatpickr-day.selected.nextMonthDay, .flatpickr-day.startRange.nextMonthDay, .flatpickr-day.endRange.nextMonthDay {
      background: linear-gradient(135deg, var(--rose-400), var(--lavender-300)) !important;
      border-color: transparent !important;
      box-shadow: 0 4px 12px rgba(255, 107, 138, 0.3) !important;
    }
    .flatpickr-day:hover {
      background: rgba(255, 255, 255, 0.7) !important;
      border-color: transparent !important;
    }
    .flatpickr-month {
      color: var(--text-primary) !important;
      fill: var(--text-primary) !important;
    }
    .flatpickr-current-month .flatpickr-monthDropdown-months {
      background: transparent !important;
      color: var(--text-primary) !important;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      font-weight: 600;
    }
    .flatpickr-current-month .flatpickr-monthDropdown-months .flatpickr-monthDropdown-month {
      background-color: #fff !important;
      color: var(--text-primary) !important;
    }
    .numInputWrapper input, .numInputWrapper input:hover {
      background: transparent !important;
      color: var(--text-primary) !important;
    }
    .flatpickr-time {
      border-top: 1px solid rgba(255, 255, 255, 0.4) !important;
    }
    .flatpickr-time input, .flatpickr-time .flatpickr-am-pm {
      color: var(--text-primary) !important;
    }
    .flatpickr-prev-month svg, .flatpickr-next-month svg {
      fill: var(--text-secondary) !important;
    }
    .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg {
      fill: var(--rose-400) !important;
    }
    .flatpickr-time input:hover, .flatpickr-time .flatpickr-am-pm:hover, .flatpickr-time input:focus, .flatpickr-time .flatpickr-am-pm:focus {
      background: rgba(255, 255, 255, 0.4) !important;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    .numInputWrapper span { border: none !important; background: transparent !important; }
    .numInputWrapper span:hover { background: rgba(255, 255, 255, 0.4) !important; }
    .numInputWrapper span.arrowUp::after { border-bottom-color: var(--text-secondary) !important; }
    .numInputWrapper span.arrowUp:hover::after { border-bottom-color: var(--rose-400) !important; }
    .numInputWrapper span.arrowDown::after { border-top-color: var(--text-secondary) !important; }
    .numInputWrapper span.arrowDown:hover::after { border-top-color: var(--rose-400) !important; }

    .time-hint {
      font-size: 14px;
      color: var(--rose-500);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease;
      margin-bottom: 16px;
      height: 20px;
    }

    /* ── Custom Injected Time Wheel ── */
    .custom-time-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      margin: 8px 16px;
    }
    .time-wheel-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      margin: 0 16px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }
    .time-wheel-overlay {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 30px;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      pointer-events: none;
      z-index: 1;
    }
    .time-wheel {
      position: relative;
      flex: 1;
      height: 100%;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 35px 0;
    }
    .time-wheel::-webkit-scrollbar {
      display: none;
    }
    .wheel-item {
      height: 30px;
      line-height: 30px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      scroll-snap-align: center;
      transition: all 0.2s;
    }
    .wheel-item.active {
      color: var(--rose-500);
      font-size: 20px;
      transform: scale(1.1);
    }
    .time-wheel-colon {
      font-size: 20px;
      font-weight: 700;

  <script>
    // ── Configuration ──
    // ⚠️ 警告：這是一個私人專案，由於放在 GitHub Pages 等純靜態網頁，無法使用後端隱藏金鑰。
    // 以下採用了 Base64 字串拆分混淆，這只是基礎防護 (防君子不防小人)，
    // 主要目的是防止 GitHub 上的自動化爬蟲機器人直接抓取 Webhook 網址並濫發垃圾訊息。
    // 若要更換 Webhook，請將新網址拆分成四段，分別在瀏覽器 Console 執行 btoa("字串") 後替換下方陣列。
    const _w = [
      "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3Mv",
      "MTUyNzAzODk2ODY3MDA2NDg4MQ==",
      "L0VaVmhiWjRibFE5VG5DZUJsWnR2SG55Rk43UFNEd2tn",
      "a3NqTHFzS0VQZ1dzY1FURWhKRFg3amFjdDF5Q1F2dU5XUTBR"
    ];
    function getW() {
      try { return atob(_w[0]) + atob(_w[1]) + atob(_w[2]) + atob(_w[3]); }
      catch(e) { return ""; }
    }

    // ── Page Lifecycle Callback Map ──
    // One-shot callbacks dispatched by showPage when a target page becomes active.
    // Usage: pageCallbacks['pageN'] = fn; (auto-deleted after first call)
    var pageCallbacks = {};

    // ── Background Effects (Orbs + Floating Hearts) ──
    (function initBackground() {
      var container = document.getElementById('bgEffects');

      var orbColors = [
        'rgba(255, 107, 138, 0.35)',
        'rgba(199, 125, 255, 0.25)',
        'rgba(255, 200, 209, 0.4)',
        'rgba(224, 170, 255, 0.2)',
        'rgba(255, 255, 255, 0.3)'
      ];
      for (var i = 0; i < 5; i++) {
        var orb = document.createElement('div');

        var size = 180 + Math.random() * 250;
        orb.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + (Math.random() * 100 - 10) + '%;' +
          'top:' + (Math.random() * 100 - 10) + '%;' +
          'background:radial-gradient(circle,' + orbColors[i] + ' 0%,transparent 70%);' +
          'animation-duration:' + (10 + Math.random() * 8).toFixed(1) + 's;' +
          'animation-delay:' + (Math.random() * -10).toFixed(1) + 's;';
        container.appendChild(orb);
      }

      var hearts = ['\u{1F495}', '\u{1F497}', '\u{1F496}', '\u2661', '\u2764\uFE0F'];
      for (var j = 0; j < 12; j++) {
        var h = document.createElement('div');
        h.className = 'heart-particle';
        h.textContent = hearts[j % hearts.length];
        h.style.cssText =
          'left:' + (Math.random() * 100) + '%;' +
          'font-size:' + (10 + Math.random() * 14) + 'px;' +
          'animation-duration:' + (10 + Math.random() * 12).toFixed(1) + 's;' +
          'animation-delay:' + (Math.random() * -15).toFixed(1) + 's;';
        container.appendChild(h);
      }
    })();

    // ── Escaping NO Button ──
    class EscapeButton {
      constructor(btnId, cardId, onSurrender, tauntText) {
        this.btn = document.getElementById(btnId);
        this.card = document.getElementById(cardId);
        this.onSurrender = onSurrender;
        this.tauntText = tauntText || '妳按不到的啦 😜';
        this.escapeCount = 0;
        this.surrendered = false;
        this.initialized = false;
        this.placeholder = null;
        this.bindEvents();
      }

      initPosition() {
        if (this.initialized) return;
        var cardRect = this.card.getBoundingClientRect();
        var btnRect = this.btn.getBoundingClientRect();

        this.placeholder = document.createElement('div');
        this.placeholder.style.width = btnRect.width + 'px';
        this.placeholder.style.height = btnRect.height + 'px';
        this.placeholder.style.margin = window.getComputedStyle(this.btn).margin;
        this.btn.parentNode.insertBefore(this.placeholder, this.btn);

        this.btn.style.position = 'absolute';
        this.btn.style.left = (btnRect.left - cardRect.left - this.card.clientLeft) + 'px';
        this.btn.style.top  = (btnRect.top  - cardRect.top  - this.card.clientTop)  + 'px';
        this.btn.style.margin = '0';
        this.initialized = true;
      }

      doEscape(e) {
        if (this.surrendered) return;
        if (e && e.type === 'touchstart' && e.cancelable) e.preventDefault();

        this.initPosition();
        this.escapeCount++;

        if (this.escapeCount >= 6) {
          this.surrendered = true;
          this.btn.classList.add('surrendered');
          this.btn.textContent = '好啦我願意 💗';
          if (this.placeholder && this.placeholder.parentNode) {
            this.placeholder.parentNode.removeChild(this.placeholder);
            this.placeholder = null;
          }
          return;
        }

        if (this.escapeCount >= 3) {
          this.btn.textContent = this.tauntText;
        }

        var cardRect = this.card.getBoundingClientRect();
        var cx = this.card.clientWidth / 2, cy = this.card.clientHeight / 2;

        if (e && e.touches && e.touches.length > 0) {
          cx = e.touches[0].clientX - cardRect.left - this.card.clientLeft;
          cy = e.touches[0].clientY - cardRect.top  - this.card.clientTop;
        } else if (e && e.clientX !== undefined) {
          cx = e.clientX - cardRect.left - this.card.clientLeft;
          cy = e.clientY - cardRect.top  - this.card.clientTop;
        }

        var pad = 16;
        var btnW = this.btn.offsetWidth;
        var btnH = this.btn.offsetHeight;
        var maxW = this.card.clientWidth;
        var maxH = this.card.clientHeight;

        var minX = pad;
        var minY = pad;
        var maxX = maxW - btnW - pad;
        var maxY = maxH - btnH - pad;

        // Ensure button does not overflow the visible viewport
        var viewMinX = pad - cardRect.left - this.card.clientLeft;
        var viewMinY = pad - cardRect.top - this.card.clientTop;
        var viewMaxX = window.innerWidth - cardRect.left - this.card.clientLeft - btnW - pad;
        var viewMaxY = window.innerHeight - cardRect.top - this.card.clientTop - btnH - pad;

        minX = Math.max(minX, viewMinX);
        minY = Math.max(minY, viewMinY);
        maxX = Math.min(maxX, viewMaxX);
        maxY = Math.min(maxY, viewMaxY);

        if (maxX <= minX || maxY <= minY) {
          this.escapeCount = 6;
          this.doEscape(e);
          return;
        }

        var nx, ny, dist, attempts = 0;

        do {
          nx = minX + Math.random() * (maxX - minX);
          ny = minY + Math.random() * (maxY - minY);
          dist = Math.hypot(nx + btnW / 2 - cx, ny + btnH / 2 - cy);
          attempts++;
        } while (dist < 80 && attempts < 20);

        if (isNaN(nx)) nx = minX;
        if (isNaN(ny)) ny = minY;

        nx = Math.max(minX, Math.min(nx, maxX));
        ny = Math.max(minY, Math.min(ny, maxY));

        this.btn.style.left = nx + 'px';
        this.btn.style.top  = ny + 'px';
        this.btn.style.visibility = 'visible';
        this.btn.style.opacity = '1';
      }

      bindEvents() {
        var _this = this;
        this.btn.addEventListener('mouseenter', function(e) { _this.doEscape(e); });
        this.btn.addEventListener('touchstart', function(e) { _this.doEscape(e); }, { passive: false });
        this.btn.addEventListener('click', function(e) {
          e.preventDefault();
          if (_this.surrendered) _this.onSurrender();
          else _this.doEscape(e);
        });
      }
    }

    var escapeBtn1 = new EscapeButton('btnNo', 'card1', handleYes, '妳按不到的啦 😜');
    var escapeBtn2 = new EscapeButton('btnNo2', 'card6', handleFinaleYes, '妳逃不掉的 😜');

    // ── Confetti Particle System ──
    function burst() {
      var colors = ['#ff6b8a', '#ff8fa3', '#c77dff', '#e0aaff', '#ffc2d1', '#fff'];
      for (var i = 0; i < 90; i++) {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        var size = 6 + Math.random() * 14;
        var color = colors[Math.floor(Math.random() * colors.length)];
        var left = Math.random() * 100;
        var delay = Math.random() * 0.4;
        var duration = 1.5 + Math.random() * 2;
        var radius = Math.random() > 0.5 ? '50%' : '3px';

        el.style.cssText =
          'left:' + left + '%;top:-5%;' +
          'width:' + size + 'px;height:' + size + 'px;' +
          'background:' + color + ';' +
          'border-radius:' + radius + ';' +
          'animation-duration:' + duration + 's;' +
          'animation-delay:' + delay + 's;' +
          'opacity:0.9;';
        document.body.appendChild(el);
        setTimeout(function(node) { node.remove(); }.bind(null, el), (duration + delay) * 1000 + 100);
      }
    }

    // ── Page Navigation with Smooth Transitions ──
    function showPage(targetId) {
      var current = document.querySelector('.page.active');
      var target = document.getElementById(targetId);
      if (!current || current === target) return;

      // Exit current page
      current.classList.add('leaving');
      current.classList.remove('active');

      // Enter target page after exit transition
      setTimeout(function() {
        current.classList.remove('leaving');

        // Re-trigger stagger animations on target children
        var children = target.querySelectorAll('.card > *');
        for (var i = 0; i < children.length; i++) {
          children[i].style.animation = 'none';
          void children[i].offsetHeight; // force reflow
          children[i].style.animation = '';
        }

        target.classList.add('active');

        // Dispatch one-shot page-enter callback if registered
        if (pageCallbacks && pageCallbacks[targetId]) {
          var cb = pageCallbacks[targetId];
          delete pageCallbacks[targetId];
          cb();
        }

    var chosenPage5Option = '';
    let chosenDate = '';
    let fpInstance = null;
    let chosenHour = '12';
    let chosenMinute = '00';

    // ── Page 4: Slide-to-Unlock Logic ──
    var sliderInitialized = false;

    // Register one-shot init callback; fires 420ms after page4 transition ends
    pageCallbacks['page4'] = function() {
      if (!fpInstance) {
        fpInstance = flatpickr("#datePicker", {
          enableTime: false,
          dateFormat: "Y-m-d H:i",
          minDate: "today",
          disableMobile: true,
          closeOnSelect: false,
          monthSelectorType: "static",
          locale: "zh_tw",
          onChange: function(selectedDates, dateStr, instance) {
            document.getElementById('dateHint').style.opacity = '0';
            document.getElementById('datePicker').classList.remove('shake');
            if (selectedDates[0]) {
              selectedDates[0].setHours(parseInt(chosenHour, 10), parseInt(chosenMinute, 10), 0, 0);
              instance.setDate(selectedDates[0], false);
            }
          },
          onReady: function(selectedDates, dateStr, instance) {
            instance.calendarContainer.classList.add('glass-calendar');
            if (instance.currentYearElement) {
              instance.currentYearElement.disabled = true;
            }

            var wheelHTML = `
              <div class="custom-time-divider"></div>
              <div class="time-wheel-container">
                <div class="time-wheel-overlay"></div>
                <div class="time-wheel custom-hour-wheel"></div>
                <div class="time-wheel-colon">:</div>
                <div class="time-wheel custom-minute-wheel"></div>
              </div>
            `;
            instance.calendarContainer.insertAdjacentHTML('beforeend', wheelHTML);
            
            var hw = instance.calendarContainer.querySelector('.custom-hour-wheel');
            var mw = instance.calendarContainer.querySelector('.custom-minute-wheel');
            
            function populateWheel(wheel, start, end, step, isHour) {
              var obs = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                  if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    if (isHour) {
                      chosenHour = entry.target.dataset.value;
                    } else {
                      chosenMinute = entry.target.dataset.value;
                    }
                    if (instance.selectedDates[0]) {
                      instance.selectedDates[0].setHours(parseInt(chosenHour, 10), parseInt(chosenMinute, 10), 0, 0);
                      instance.setDate(instance.selectedDates[0], false);
                    }
                  } else {
                    entry.target.classList.remove('active');
                  }
                });
              }, { root: wheel, rootMargin: "-35px 0px -35px 0px", threshold: 0.5 });

              var targetOffset = 0;
              for (var i = start; i <= end; i += step) {
                var val = i < 10 ? '0' + i : '' + i;
                var div = document.createElement('div');
                div.className = 'wheel-item';
                div.textContent = val;
                div.dataset.value = val;
                wheel.appendChild(div);
                obs.observe(div);
                
                var targetVal = isHour ? chosenHour : chosenMinute;
                if (val === targetVal) {
                  targetOffset = Math.floor((i - start) / step) * 30;
                }
              }
              wheel.dataset.targetScroll = targetOffset;

              // Prevent Flatpickr from stealing mouse wheel events to change months
              wheel.addEventListener('wheel', function(e) {
                e.stopPropagation();
              }, { passive: true });

              // Enable Mouse Drag-to-Scroll for Desktop
              let isDown = false;
              let startY;
              let scrollTop;

              wheel.addEventListener('mousedown', function(e) {
                isDown = true;
                wheel.style.scrollSnapType = 'none'; // disable snap during drag
                startY = e.pageY - wheel.offsetTop;
                scrollTop = wheel.scrollTop;
              });
              wheel.addEventListener('mouseleave', function() {
                isDown = false;
                wheel.style.scrollSnapType = 'y mandatory';
              });
              wheel.addEventListener('mouseup', function() {
                isDown = false;
                wheel.style.scrollSnapType = 'y mandatory';
              });
              wheel.addEventListener('mousemove', function(e) {
                if (!isDown) return;
                e.preventDefault();
                const y = e.pageY - wheel.offsetTop;
                const walk = (y - startY) * 1.5; // scrolling speed
                wheel.scrollTop = scrollTop - walk;
              });
            }
            
            populateWheel(hw, 0, 23, 1, true);
            populateWheel(mw, 0, 55, 5, false);
          },
          onOpen: function(selectedDates, dateStr, instance) {
            var hw = instance.calendarContainer.querySelector('.custom-hour-wheel');
            var mw = instance.calendarContainer.querySelector('.custom-minute-wheel');
            if (hw && hw.dataset.targetScroll !== undefined) {
              hw.scrollTop = parseInt(hw.dataset.targetScroll, 10);
              delete hw.dataset.targetScroll;
            }
            if (mw && mw.dataset.targetScroll !== undefined) {
              mw.scrollTop = parseInt(mw.dataset.targetScroll, 10);
              delete mw.dataset.targetScroll;
            }
          }
        });
      }

      setTimeout(function() {
        initSlider('sliderTrack', 'sliderThumb', 'sliderLabel', function() {
          showPage('page5');
        }, function() {
          var dp = document.getElementById('datePicker');
          var hint = document.getElementById('dateHint');
          // Check array length as requested by logic reviewer
          if (fpInstance.selectedDates.length === 0) {
            dp.classList.remove('shake');
            void dp.offsetWidth; // trigger reflow
            dp.classList.add('shake');
            hint.style.opacity = '1';
            return false;
          }
          hint.style.opacity = '0';
          chosenDate = dp.value;
          return true;
        });
      }, 420);
    };

    function initSlider(trackId, thumbId, labelId, onUnlock, validationCallback) {
      if (sliderInitialized) return;
      sliderInitialized = true;

      var track   = document.getElementById(trackId);
      var thumb   = document.getElementById(thumbId);
      var label   = document.getElementById(labelId);
      var unlocked = false;
      var dragging  = false;
      var startX    = 0;
      var startLeft = 0;
      var THUMB_SIZE = 48;
      var PAD        = 8;

      // Insert fill bar dynamically so the HTML stays clean
      var fill = document.createElement('div');
      fill.className = 'slider-fill';
      track.insertBefore(fill, track.firstChild);

      function getTrackMax() {
        return track.clientWidth - THUMB_SIZE - PAD * 2;
      }

      function setThumbPos(px) {
        var max     = getTrackMax();
        var clamped = Math.max(0, Math.min(px, max));
        thumb.style.left = (PAD + clamped) + 'px';
        fill.style.width = (PAD + clamped + THUMB_SIZE / 2) + 'px';
        var pct = clamped / max;
        label.style.opacity = Math.max(0, 1 - pct * 2).toString();
        track.setAttribute('aria-valuenow', Math.round(pct * 100));
        if (pct >= 0.85 && !unlocked) triggerUnlock();
      }

      function onPointerDown(e) {
        if (unlocked) return;
        if (validationCallback && !validationCallback()) return;
        dragging  = true;
        startX    = e.touches ? e.touches[0].clientX : e.clientX;
        startLeft = parseInt(thumb.style.left || PAD, 10) - PAD;
        thumb.classList.add('dragging');
        if (e.cancelable) e.preventDefault();
      }

      function onPointerMove(e) {
        if (!dragging || unlocked) return;
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        setThumbPos(startLeft + (clientX - startX));
      }

      function onPointerUp() {
        if (!dragging || unlocked) return;
        dragging = false;
        thumb.classList.remove('dragging');
        // Animate snap-back to start
        thumb.style.transition = 'left 0.35s var(--ease-smooth)';
        fill.style.transition  = 'width 0.35s var(--ease-smooth)';
        thumb.style.left  = PAD + 'px';
        fill.style.width  = '0';
        label.style.opacity = '1';
        track.setAttribute('aria-valuenow', 0);
        setTimeout(function() {
          thumb.style.transition = '';
          fill.style.transition  = '';
        }, 360);
      }

      // Named refs required for removeEventListener in cleanup()
      function onMouseMove(e) { onPointerMove(e); }
      function onMouseUp()    { onPointerUp();    }
      function onTouchMove(e) { onPointerMove(e); }
      function onTouchEnd()   { onPointerUp();    }

      function cleanup() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend',  onTouchEnd);
      }

      function triggerUnlock() {
        unlocked = true;
        dragging = false;
        cleanup(); // Stop listening globally — no more overhead
        thumb.classList.remove('dragging');

        // Snap thumb to the far end
        var max = getTrackMax();
        thumb.style.transition = 'left 0.2s ease';
        fill.style.transition  = 'width 0.2s ease';
        thumb.style.left  = (PAD + max) + 'px';
        fill.style.width  = track.clientWidth + 'px';
        label.style.opacity = '0';
        thumb.textContent = '✓';
        track.classList.add('unlocked');
        track.setAttribute('aria-valuenow', 100);

        // Show unlock confirmation text after snap animation
        setTimeout(function() {
          label.textContent   = '時間已鎖定 💕';
          label.style.opacity = '1';
        }, 220);

        burst();
        if (onUnlock) {
          setTimeout(onUnlock, 1200);
        }
      }

      // Bind drag events
      thumb.addEventListener('mousedown',  onPointerDown);
      thumb.addEventListener('touchstart', onPointerDown, { passive: false });
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup',   onMouseUp);
      document.addEventListener('touchmove', onTouchMove, { passive: true });
      document.addEventListener('touchend',  onTouchEnd);
    }

    // ── Helper ──
    function stripEmoji(str) {
      if (!str) return '';
      try {
        return str.replace(/\p{Extended_Pictographic}/gu, '').trim();
      } catch(e) {
        return str.replace(/\s+\S+$/, '').trim(); // fallback
      }
    }

    pageCallbacks['page6'] = function() {

      var page2Element = document.getElementById('chosenOption');

        var payload = {

          console.error("Webhook 發送失敗:", e);
        });
      }
    }
