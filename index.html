<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>想和妳變得更親密 💕</title>
  <meta name="description" content="一封來自心底的浪漫邀請，想和最特別的妳變得更親密" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Custom Properties ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose-100: #ffe0e6;
      --rose-200: #ffc2d1;
      --rose-300: #ff8fa3;
      --rose-400: #ff6b8a;
      --rose-500: #ff3366;
      --lavender-200: #e0aaff;
      --lavender-300: #c77dff;
      --lavender-400: #9d4edd;
      --text-primary: #2d1b30;
      --text-secondary: #6b4c6e;
      --glass-bg: rgba(255, 255, 255, 0.22);
      --glass-border: rgba(255, 255, 255, 0.35);
      --card-shadow:
        0 8px 32px rgba(45, 27, 48, 0.1),
        0 2px 8px rgba(45, 27, 48, 0.06);
      --card-radius: 28px;
      --btn-radius: 50px;
      --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ── Body & Animated Background ── */
    body {
      font-family: 'Outfit', 'Noto Sans TC', -apple-system, sans-serif;
      background: linear-gradient(-45deg, #ffdde1, #f5c6d0, #e8b4c8, #dbb4d4, #c9b4e8);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      25%  { background-position: 50% 0%; }
      50%  { background-position: 100% 50%; }
      75%  { background-position: 50% 100%; }
    }

    /* ── Background Effects ── */
    .bg-effects {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.5;
      animation: floatOrb ease-in-out infinite alternate;
    }

    @keyframes floatOrb {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -25px) scale(1.05); }
      66%  { transform: translate(-20px, 15px) scale(0.95); }
      100% { transform: translate(10px, -10px) scale(1.02); }
    }

    .heart-particle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: floatHeart linear infinite;
    }

    @keyframes floatHeart {
      0%   { transform: translateY(105vh) rotate(0deg) scale(0.6); opacity: 0; }
      8%   { opacity: 0.5; }
      50%  { transform: translateY(50vh) rotate(10deg) scale(1); opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(-5deg) scale(0.8); opacity: 0; }
    }

    /* ── Page Layout & Transitions ── */
    .page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transform: translateY(28px) scale(0.97);
      transition: opacity 0.4s ease, transform 0.4s var(--ease-smooth);
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .page.leaving {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px) scale(0.97);
    }

    /* ── Card Glassmorphism ── */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.45);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
      position: relative;
    }

    /* Subtle top shine overlay */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 100%);
      border-radius: var(--card-radius) var(--card-radius) 0 0;
      pointer-events: none;
    }

    /* ── Avatar with Gradient Ring ── */
    .avatar-ring {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--rose-400), var(--lavender-300), var(--rose-300));
      background-size: 200% 200%;
      animation: ringGlow 4s ease infinite, gentleFloat 4s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(255, 107, 138, 0.25), 0 0 80px rgba(199, 125, 255, 0.1);
      flex-shrink: 0;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.85);
      display: block;
    }

    @keyframes ringGlow {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    /* ── Typography ── */
    .title {
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 700;
      line-height: 1.4;
      background: linear-gradient(135deg, var(--rose-500), var(--lavender-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(14px, 3.5vw, 16px);
      color: var(--text-secondary);
      line-height: 1.8;
      font-weight: 500;
      margin-top: 6px;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 2px;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-200), transparent);
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
    }

    .btn {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      padding: 14px 36px;
      border: none;
      border-radius: var(--btn-radius);
      user-select: none;
      white-space: nowrap;
      transition: all 0.3s var(--ease-smooth);
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .btn-yes {
      background: linear-gradient(135deg, var(--rose-400) 0%, var(--lavender-300) 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 107, 138, 0.35);
      letter-spacing: 0.5px;
    }

    /* Shimmer sweep on hover */
    .btn-yes::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
      transition: left 0.6s ease;
    }

    .btn-yes:active { transform: translateY(1px) scale(0.97); }

    .btn-no {
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      transition: left 0.25s var(--ease-smooth),
                  top 0.25s var(--ease-smooth),
                  background 0.3s ease,
                  color 0.3s ease;
    }

    /* Extended hover zone for escape trigger */
    #btnNo:not(.surrendered)::before {
      content: '';
      position: absolute;
      top: -35px; right: -35px; bottom: -35px; left: -35px;
      z-index: -1;
    }

    /* ── Option Grid ── */
    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
    }

    .option-card {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 22px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s var(--ease-smooth);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .option-emoji {
      font-size: 32px;
      line-height: 1;
      transition: transform 0.3s ease;
    }

    .option-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .option-card:active {
      transform: translateY(1px) scale(0.97);
    }

    /* ── Big Emoji (Page 2 & 3) ── */
    .big-emoji {
      font-size: 64px;
      line-height: 1;
      animation: heartPulse 1.5s ease-in-out infinite;
    }

    @keyframes heartPulse {
      0%, 100% { transform: scale(1); }
      15%  { transform: scale(1.15); }
      30%  { transform: scale(1); }
      45%  { transform: scale(1.08); }
      60%  { transform: scale(1); }
    }

    /* ── Response Page (Page 3) ── */
    .response-text {
      font-size: clamp(15px, 4vw, 17px);
      color: var(--text-primary);
      line-height: 1.9;
      font-weight: 500;
    }

    .chosen-highlight {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose-400), var(--lavender-300));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      padding: 12px 0;
    }

    .btn-back {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 12px 28px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.25);
      color: var(--text-secondary);
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotateX(0) rotateZ(0); opacity: 1; }
      100% { transform: translateY(100vh) rotateX(720deg) rotateZ(360deg); opacity: 0; }
    }

    /* ── Focus Indicators ── */
    .btn:focus-visible,
    .option-card:focus-visible,
    .btn-back:focus-visible {
      outline: 3px solid var(--lavender-300);
      outline-offset: 3px;
    }

    /* ── Hover Effects (pointer devices only) ── */
    @media (hover: hover) {
      .btn-yes:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 8px 30px rgba(255, 107, 138, 0.45);
      }
      .btn-yes:hover::after {
        left: 100%;
      }
      .option-card:hover {
        transform: translateY(-6px);
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 12px 32px rgba(155, 93, 229, 0.15);
        border-color: rgba(199, 125, 255, 0.4);
      }
      .option-card:hover .option-emoji {
        transform: scale(1.25);
      }
      .btn-back:hover {
        background: rgba(255, 255, 255, 0.5);
        transform: translateX(-4px);
        border-color: rgba(255, 255, 255, 0.9);
      }
    }

    /* ── Staggered Entrance Animation ── */
    .card > * { opacity: 0; }

    .page.active .card > * {
      animation: childSlideIn 0.5s ease forwards;
    }
    .page.active .card > *:nth-child(1) { animation-delay: 0.05s; }
    .page.active .card > *:nth-child(2) { animation-delay: 0.12s; }
    .page.active .card > *:nth-child(3) { animation-delay: 0.19s; }
    .page.active .card > *:nth-child(4) { animation-delay: 0.26s; }
    .page.active .card > *:nth-child(5) { animation-delay: 0.32s; }
    .page.active .card > *:nth-child(6) { animation-delay: 0.38s; }

    @keyframes childSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Accessibility: Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.2s !important;
      }
      body { animation: none; }
      .card > * { opacity: 1; }
    }

    /* ── Responsive: Tablet ── */
    @media (max-width: 768px) {
      .card {
        padding: 40px 28px;
        gap: 20px;
      }
      .option-grid { gap: 12px; }
    }

    /* ── Responsive: Mobile ── */
    @media (max-width: 480px) {
      .page { padding: 16px 12px; }

      .card {
        padding: 32px 20px;
        border-radius: 22px;
        gap: 16px;
      }
      .avatar-ring {
        width: 130px;
        height: 130px;
      }
      .btn {
        padding: 14px 28px;
        font-size: 16px;
        width: 100%;
      }
      .btn-row {
        flex-direction: column;
        gap: 12px;
      }
      .option-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .option-card {
        flex-direction: row;
        padding: 16px 20px;
        gap: 14px;
      }
      .option-emoji { font-size: 28px; }
      .big-emoji { font-size: 52px; }

      #btnNo:not(.surrendered)::before {
        top: -20px; right: -20px; bottom: -20px; left: -20px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Effects -->
  <div class="bg-effects" id="bgEffects" aria-hidden="true"></div>

  <!-- PAGE 1: Invitation -->
  <section class="page active" id="page1">
    <section class="card" id="card1" aria-label="邀請卡">
      <div class="avatar-ring">
        <img src="pixel_couple.png" alt="可愛的情侶頭像" />
      </div>
      <div>
        <h1 class="title">想和妳變得更親密</h1>
        <p class="subtitle">給最特別的妳，一個小小的邀請 ✨</p>
      </div>
      <div class="btn-row" id="btnRow">
        <button class="btn btn-yes" id="btnYes" onclick="handleYes()" aria-label="答應邀請">💗 我願意</button>
        <button class="btn btn-no" id="btnNo" aria-label="拒絕邀請">先不要</button>
      </div>
    </section>
  </section>

  <!-- PAGE 2: Choose Activity -->
  <section class="page" id="page2">
    <section class="card" aria-label="選擇約會方式">
      <div class="big-emoji" aria-hidden="true">🤝</div>
      <div>
        <h1 class="title">那我們從牽手開始吧！</h1>
        <p class="subtitle">選一個妳最喜歡的方式</p>
      </div>
      <p class="section-label">接下來想要</p>
      <div class="option-grid">
        <button class="option-card" onclick="handleOption('一起散步牽手 🌸')">
          <span class="option-emoji">🌸</span>
          <span class="option-text">一起散步牽手</span>
        </button>
        <button class="option-card" onclick="handleOption('一起看電影 🎬')">
          <span class="option-emoji">🎬</span>
          <span class="option-text">一起看電影</span>
        </button>
        <button class="option-card" onclick="handleOption('一起吃飯約會 🍜')">
          <span class="option-emoji">🍜</span>
          <span class="option-text">一起吃飯約會</span>
        </button>
        <button class="option-card" onclick="handleOption('傳訊息聊到天亮 💬')">
          <span class="option-emoji">💬</span>
          <span class="option-text">傳訊息聊到天亮</span>
        </button>
        <button class="option-card" onclick="handleOption('一起拍可愛的合照 📸')">
          <span class="option-emoji">📸</span>
          <span class="option-text">一起拍可愛的合照</span>
        </button>
        <button class="option-card" onclick="handleOption('以上全部都要 💖')">
          <span class="option-emoji">💖</span>
          <span class="option-text">以上全部都要</span>
        </button>
      </div>
    </section>
  </section>

  <!-- PAGE 3: Confirmation -->
  <section class="page" id="page3">
    <section class="card" aria-label="約會確認">
      <div class="big-emoji" id="p3Emoji" aria-hidden="true">💕</div>
      <h1 class="title">太好了！！</h1>
      <p class="response-text">
        妳選擇了...
        <span class="chosen-highlight" id="chosenOption"></span>
        那就說好囉，<br/>期待和妳在一起的每一刻 ✨
      </p>
      <button class="btn-back" onclick="goBack()" aria-label="重新選擇">← 重新選擇</button>
    </section>
  </section>

  <script>
    // ── Background Effects (Orbs + Floating Hearts) ──
    (function initBackground() {
      var container = document.getElementById('bgEffects');

      var orbColors = [
        'rgba(255, 107, 138, 0.35)',
        'rgba(199, 125, 255, 0.25)',
        'rgba(255, 200, 209, 0.4)',
        'rgba(224, 170, 255, 0.2)',
        'rgba(255, 255, 255, 0.3)'
      ];
      for (var i = 0; i < 5; i++) {
        var orb = document.createElement('div');
        orb.className = 'orb';
        var size = 180 + Math.random() * 250;
        orb.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + (Math.random() * 100 - 10) + '%;' +
          'top:' + (Math.random() * 100 - 10) + '%;' +
          'background:radial-gradient(circle,' + orbColors[i] + ' 0%,transparent 70%);' +
          'animation-duration:' + (10 + Math.random() * 8).toFixed(1) + 's;' +
          'animation-delay:' + (Math.random() * -10).toFixed(1) + 's;';
        container.appendChild(orb);
      }

      var hearts = ['\u{1F495}', '\u{1F497}', '\u{1F496}', '\u2661', '\u2764\uFE0F'];
      for (var j = 0; j < 12; j++) {
        var h = document.createElement('div');
        h.className = 'heart-particle';
        h.textContent = hearts[j % hearts.length];
        h.style.cssText =
          'left:' + (Math.random() * 100) + '%;' +
          'font-size:' + (10 + Math.random() * 14) + 'px;' +
          'animation-duration:' + (10 + Math.random() * 12).toFixed(1) + 's;' +
          'animation-delay:' + (Math.random() * -15).toFixed(1) + 's;';
        container.appendChild(h);
      }
    })();

    // ── Escaping NO Button ──
    var btnNo = document.getElementById('btnNo');
    var escapeCount = 0;
    var surrendered = false;
    var noInitialized = false;

    function initNoPosition() {
      if (noInitialized) return;
      var card = document.getElementById('card1');
      var cardRect = card.getBoundingClientRect();
      var btnRect = btnNo.getBoundingClientRect();

      btnNo.style.position = 'absolute';
      btnNo.style.left = (btnRect.left - cardRect.left) + 'px';
      btnNo.style.top = (btnRect.top - cardRect.top) + 'px';
      btnNo.style.margin = '0';
      btnNo.style.width = btnRect.width + 'px';
      noInitialized = true;
    }

    function doEscape(e) {
      if (surrendered) return;
      if (e && e.type === 'touchstart' && e.cancelable) e.preventDefault();

      initNoPosition();
      escapeCount++;

      // Surrender after enough attempts
      if (escapeCount >= 6) {
        surrendered = true;
        btnNo.classList.add('surrendered');
        btnNo.textContent = '好啦我願意 💗';
        btnNo.style.background = 'linear-gradient(135deg, var(--rose-400), var(--lavender-300))';
        btnNo.style.color = '#fff';
        btnNo.style.position = 'static';
        btnNo.style.width = 'auto';
        btnNo.style.transform = 'none';
        btnNo.style.borderColor = 'transparent';
        btnNo.style.boxShadow = '0 4px 20px rgba(255, 107, 138, 0.35)';
        return;
      }

      // Taunt after 3 attempts
      if (escapeCount >= 3) {
        btnNo.textContent = '妳按不到的啦 😜';
      }

      // Calculate escape destination within card bounds
      var card = document.getElementById('card1');
      var cardRect = card.getBoundingClientRect();
      var btnW = btnNo.offsetWidth;
      var btnH = btnNo.offsetHeight;
      var cx, cy;

      if (e && e.touches && e.touches.length > 0) {
        cx = e.touches[0].clientX - cardRect.left;
        cy = e.touches[0].clientY - cardRect.top;
      } else if (e && e.clientX !== undefined) {
        cx = e.clientX - cardRect.left;
        cy = e.clientY - cardRect.top;
      } else {
        cx = cardRect.width / 2;
        cy = cardRect.height / 2;
      }

      if (e && e.type === 'focus') btnNo.blur();

      var pad = 16;
      var maxX = Math.max(0, cardRect.width - btnW - pad);
      var maxY = Math.max(0, cardRect.height - btnH - pad);
      var nx, ny, dist, attempts = 0;

      do {
        nx = pad + Math.random() * maxX;
        ny = pad + Math.random() * maxY;
        dist = Math.hypot(nx + btnW / 2 - cx, ny + btnH / 2 - cy);
        attempts++;
      } while (dist < 80 && attempts < 20);

      btnNo.style.left = nx + 'px';
      btnNo.style.top = ny + 'px';
    }

    btnNo.addEventListener('mouseenter', doEscape);
    btnNo.addEventListener('touchstart', doEscape, { passive: false });
    btnNo.addEventListener('focus', doEscape);
    btnNo.addEventListener('click', function(e) {
      e.preventDefault();
      if (surrendered) handleYes();
      else doEscape(e);
    });

    // ── Confetti Particle System ──
    function burst() {
      var colors = ['#ff6b8a', '#ff8fa3', '#c77dff', '#e0aaff', '#ffc2d1', '#fff'];
      for (var i = 0; i < 90; i++) {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        var size = 6 + Math.random() * 14;
        var color = colors[Math.floor(Math.random() * colors.length)];
        var left = Math.random() * 100;
        var delay = Math.random() * 0.4;
        var duration = 1.5 + Math.random() * 2;
        var radius = Math.random() > 0.5 ? '50%' : '3px';

        el.style.cssText =
          'left:' + left + '%;top:-5%;' +
          'width:' + size + 'px;height:' + size + 'px;' +
          'background:' + color + ';' +
          'border-radius:' + radius + ';' +
          'animation-duration:' + duration + 's;' +
          'animation-delay:' + delay + 's;' +
          'opacity:0.9;';
        document.body.appendChild(el);
        setTimeout(function(node) { node.remove(); }.bind(null, el), (duration + delay) * 1000 + 100);
      }
    }

    // ── Page Navigation with Smooth Transitions ──
    function showPage(targetId) {
      var current = document.querySelector('.page.active');
      var target = document.getElementById(targetId);
      if (!current || current === target) return;

      // Exit current page
      current.classList.add('leaving');
      current.classList.remove('active');

      // Enter target page after exit transition
      setTimeout(function() {
        current.classList.remove('leaving');

        // Re-trigger stagger animations on target children
        var children = target.querySelectorAll('.card > *');
        for (var i = 0; i < children.length; i++) {
          children[i].style.animation = 'none';
          void children[i].offsetHeight; // force reflow
          children[i].style.animation = '';
        }

        target.classList.add('active');
      }, 400);
    }

    function handleYes() {
      burst();
      setTimeout(function() { showPage('page2'); }, 500);
    }

    function handleOption(opt) {
      document.getElementById('chosenOption').textContent = opt;
      var emojiMap = {
        '一起散步牽手 🌸': '🌸',
        '一起看電影 🎬': '🎬',
        '一起吃飯約會 🍜': '🍜',
        '傳訊息聊到天亮 💬': '💬',
        '一起拍可愛的合照 📸': '📸',
        '以上全部都要 💖': '🥰'
      };
      document.getElementById('p3Emoji').textContent = emojiMap[opt] || '💕';
      burst();
      setTimeout(function() { showPage('page3'); }, 450);
    }

    function goBack() {
      showPage('page2');
    }
  </script>
</body>
